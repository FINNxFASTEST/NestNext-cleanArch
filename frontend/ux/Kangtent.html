<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kangtent — Cozy Campsite Booking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Inter:wght@400;500;600&family=Bai+Jamjuree:wght@300;400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/Scene.jsx"></script>
<script type="text/babel" src="components/Shared.jsx"></script>
<script type="text/babel" src="components/Home.jsx"></script>
<script type="text/babel" src="components/Search.jsx"></script>
<script type="text/babel" src="components/Activities.jsx"></script>
<script type="text/babel" src="components/Detail.jsx"></script>
<script type="text/babel" src="components/Booking.jsx"></script>
<script type="text/babel" src="components/Admin.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// ------- Tweaks -------
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#C97B4A",
  "forest": "#2F4034",
  "cream": "#FBF7EC",
  "serifFont": "Bai Jamjuree",
  "showCampfire": true
}/*EDITMODE-END*/;

function applyTweaks(t) {
  const r = document.documentElement.style;
  r.setProperty("--ember", t.accent);
  r.setProperty("--forest-700", t.forest);
  r.setProperty("--forest-800", shade(t.forest, -10));
  r.setProperty("--forest-900", shade(t.forest, -20));
  r.setProperty("--paper", t.cream);
  r.setProperty("--font-serif", `"${t.serifFont}", Georgia, serif`);
}
function shade(hex, pct) {
  const n = parseInt(hex.slice(1), 16);
  let r = (n >> 16) & 0xff, g = (n >> 8) & 0xff, b = n & 0xff;
  const f = (1 + pct / 100);
  r = Math.max(0, Math.min(255, Math.round(r * f)));
  g = Math.max(0, Math.min(255, Math.round(g * f)));
  b = Math.max(0, Math.min(255, Math.round(b * f)));
  return "#" + [r,g,b].map(x=>x.toString(16).padStart(2,"0")).join("");
}

function TweaksPanel({ tweaks, setTweaks, onClose }) {
  const patch = (k, v) => { const nt = {...tweaks, [k]: v}; setTweaks(nt);
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}}, '*'); };
  const palettes = [
    { name: "Forest retreat",  accent: "#C97B4A", forest: "#2F4034", cream: "#FBF7EC" },
    { name: "Dusk / ember",    accent: "#D97757", forest: "#3A2E28", cream: "#F7EEE0" },
    { name: "Moss & pine",     accent: "#8B9A56", forest: "#223027", cream: "#F4F0E2" },
    { name: "Stargazer",       accent: "#D9A273", forest: "#1B2230", cream: "#F5EEDD" },
  ];
  const fonts = ["Bai Jamjuree", "Fraunces", "Georgia"];
  return (
    <div style={{
      position: "fixed", bottom: 20, right: 20, width: 280, zIndex: 10000,
      background: "#fff", borderRadius: 14, padding: 16,
      boxShadow: "0 12px 40px rgba(0,0,0,.18)", fontFamily: "Inter, system-ui",
      border: "1px solid rgba(0,0,0,.08)"
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div style={{ fontWeight: 600, fontSize: 13 }}>Tweaks</div>
        <button onClick={onClose} style={{ border: "none", background: "none", cursor: "pointer", fontSize: 16 }}>×</button>
      </div>

      <div style={{ fontSize: 10, letterSpacing: ".12em", textTransform: "uppercase", opacity: .6, marginBottom: 8 }}>Palette</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 14 }}>
        {palettes.map(p => (
          <button key={p.name} onClick={() => { patch("accent", p.accent); patch("forest", p.forest); patch("cream", p.cream); }}
            style={{
              padding: 8, borderRadius: 8, fontSize: 11, textAlign: "left",
              background: p.accent === tweaks.accent ? "#f4efe4" : "#fff",
              border: "1px solid " + (p.accent === tweaks.accent ? "#333" : "#e6e3dd"),
              cursor: "pointer", display: "flex", flexDirection: "column", gap: 6
            }}>
            <div style={{ display: "flex", gap: 4 }}>
              <span style={{ width: 14, height: 14, borderRadius: 4, background: p.forest }}/>
              <span style={{ width: 14, height: 14, borderRadius: 4, background: p.accent }}/>
              <span style={{ width: 14, height: 14, borderRadius: 4, background: p.cream, border: "1px solid #eee" }}/>
            </div>
            {p.name}
          </button>
        ))}
      </div>

      <div style={{ fontSize: 10, letterSpacing: ".12em", textTransform: "uppercase", opacity: .6, marginBottom: 8 }}>Serif</div>
      <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
        {fonts.map(f => (
          <button key={f} onClick={() => patch("serifFont", f)}
            style={{
              padding: "6px 10px", borderRadius: 999, fontSize: 11,
              background: tweaks.serifFont === f ? "#2F4034" : "#fff",
              color: tweaks.serifFont === f ? "#fff" : "#333",
              border: "1px solid #ddd", cursor: "pointer",
              fontFamily: `"${f}", serif`
            }}>{f}</button>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [editMode, setEditMode] = useState(false);

  useEffect(() => { applyTweaks(tweaks); }, [tweaks]);
  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === "__activate_edit_mode") setEditMode(true);
      if (e.data?.type === "__deactivate_edit_mode") setEditMode(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  return (
    <>
      <DesignCanvas initialZoom={0.45} backgroundColor="#e8e4d8">
        <DCSection id="desktop" title="Kangtent — cozy campsite booking" subtitle="Forest retreat · ฟอเรสต์รีทรีต">
          <DCArtboard id="home" label="01 · Home" width={1440} height={3420}>
            <Home />
          </DCArtboard>
          <DCArtboard id="search" label="02 · Search & filter" width={1440} height={2400}>
            <Search />
          </DCArtboard>
          <DCArtboard id="activities" label="03 · Activities feed" width={1440} height={3600}>
            <Activities />
          </DCArtboard>
          <DCArtboard id="activity-detail" label="04 · Activity detail" width={1440} height={2640}>
            <ActivityDetail />
          </DCArtboard>
          <DCArtboard id="detail" label="05 · Campsite detail" width={1440} height={2680}>
            <Detail />
          </DCArtboard>
          <DCArtboard id="booking" label="04 · Booking checkout" width={1440} height={2080}>
            <Booking />
          </DCArtboard>
          <DCArtboard id="admin" label="05 · Admin · Dashboard" width={1440} height={1100}>
            <Admin initial="dashboard" />
          </DCArtboard>
          <DCArtboard id="admin-camps" label="06 · Admin · Camps" width={1440} height={1100}>
            <Admin initial="camps" />
          </DCArtboard>
          <DCArtboard id="admin-bookings" label="07 · Admin · Bookings" width={1440} height={1100}>
            <Admin initial="bookings" />
          </DCArtboard>
          <DCArtboard id="admin-users" label="08 · Admin · Users" width={1440} height={1100}>
            <Admin initial="users" />
          </DCArtboard>
          <DCArtboard id="admin-coupons" label="09 · Admin · Coupons" width={1440} height={1100}>
            <Admin initial="coupons" />
          </DCArtboard>
          <DCArtboard id="admin-settings" label="10 · Admin · Settings" width={1440} height={1100}>
            <Admin initial="settings" />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      {editMode && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} onClose={() => setEditMode(false)} />}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
